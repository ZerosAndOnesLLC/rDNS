server:
    interface: 127.0.0.1@5554
    access-control: 127.0.0.0/8 allow
    do-daemonize: no
    verbosity: 0
    # Multi-threaded, matching rDNS's use of all cores for a fair comparison.
    num-threads: 24
    so-reuseport: yes
    so-rcvbuf: 4m
    so-sndbuf: 4m
    msg-cache-size: 256m
    rrset-cache-size: 512m
    num-queries-per-thread: 4096
    outgoing-range: 8192
    cache-max-ttl: 86400
    cache-min-ttl: 60
    do-ip6: no
    username: ""
    chroot: ""
    pidfile: "/tmp/unbound-bench.pid"
    log-queries: no
    log-replies: no
    val-log-level: 0
    module-config: "iterator"

forward-zone:
    name: "."
    forward-addr: 1.1.1.1
