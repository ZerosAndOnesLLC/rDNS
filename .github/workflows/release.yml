name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-freebsd-15-amd64:
    name: Build FreeBSD 15.x (amd64)
    runs-on: [self-hosted, freebsd, "15", amd64]
    env:
      TARGET: freebsd-15-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (release)
        run: cargo build --release --locked

      - name: Stage artifacts
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"
          STAGE="rdns-${TAG}-${TARGET}"
          rm -rf "$STAGE" "${STAGE}.tar.xz" "${STAGE}.tar.xz.sha256"
          mkdir -p "$STAGE"
          cp target/release/rdns "$STAGE/"
          cp target/release/rdns-control "$STAGE/"
          cp rdns.toml.example "$STAGE/"
          cp dist/rdns.rc "$STAGE/"
          cp LICENSE README.md "$STAGE/"
          tar -cJf "${STAGE}.tar.xz" "$STAGE"
          sha256 -r "${STAGE}.tar.xz" > "${STAGE}.tar.xz.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"
          STAGE="rdns-${TAG}-${TARGET}"
          gh release upload "$TAG" \
            "${STAGE}.tar.xz" \
            "${STAGE}.tar.xz.sha256" \
            --clobber --repo "${GITHUB_REPOSITORY}"

  prune-old-releases:
    name: Keep only the 20 most recent releases
    needs: build-freebsd-15-amd64
    runs-on: [self-hosted, freebsd, "15", amd64]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      KEEP: "20"
    steps:
      - name: Delete releases beyond the most recent ${{ env.KEEP }}
        run: |
          set -eu
          gh api "/repos/${REPO}/releases?per_page=100" \
            --jq "sort_by(.created_at) | reverse | .[${KEEP}:] | .[].tag_name" \
            | while IFS= read -r tag; do
                [ -n "$tag" ] || continue
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes --repo "$REPO"
              done
