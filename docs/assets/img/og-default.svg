<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <radialGradient id="bgA" cx="25%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgB" cx="80%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <rect width="1200" height="630" fill="url(#bgA)"/>
  <rect width="1200" height="630" fill="url(#bgB)"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <circle cx="112" cy="118" r="8" fill="#34d399"/>
    <text x="132" y="125" font-size="22" font-weight="600" letter-spacing="2.6" fill="#94a3b8">RDNS — A FAST, SAFE DNS SERVER</text>
    <text x="100" y="305" font-size="96" font-weight="800" letter-spacing="-1.9" fill="#f8fafc">437K queries per second.</text>
    <text x="100" y="410" font-size="96" font-weight="800" letter-spacing="-1.9" fill="url(#grad)">In Rust.</text>
    <text x="100" y="545" font-size="36" font-weight="800" fill="#f8fafc">32 µs<tspan font-weight="400" fill="#cbd5e1" dx="14">average latency</tspan><tspan fill="#cbd5e1" dx="20">·</tspan><tspan font-weight="800" fill="#f8fafc" dx="20">MIT</tspan><tspan font-weight="400" fill="#cbd5e1" dx="14">licensed</tspan></text>
  </g>
</svg>
